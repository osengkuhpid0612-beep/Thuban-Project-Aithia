name: 0612_Thuban_EXE_Forge

on:
  push:
    branches: [ "main" ] 
  workflow_dispatch:      

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 📦 檢出王國代碼
      uses: actions/checkout@v4

    - name: 🐍 配置 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 🛠️ 安裝鍛造工具與依賴
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller requests  # <--- 關鍵：在這裡加入了 requests

    - name: 🔨 執行鋼鐵封裝 (.exe)
      run: |
        # 這裡繼續沿用您的檔名 Thuban_Aithia.py.txt
        pyinstaller --onefile --name "Thuban_Aithia_Sentinel" Thuban_Aithia.py.txt

    - name: 🚀 準備空投下載
      uses: actions/upload-artifact@v4
      with:
        name: 0612_Aithia_Core_EXE
        path: dist/Thuban_Aithia_Sentinel.exe
